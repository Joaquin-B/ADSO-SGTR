<div class="login-wrapper">
        <div class="login-card">
            <div class="brand-icon">
                <i class="bi bi-bag-fill"></i>
            </div> 
            <h3>Sistema de Gestión para Tiendas de Ropa</h3>
            <p class="subtitle">Ingrese sus credenciales para acceder al sistema</p>
 
            <form onsubmit="return confirmarAccion('¿Desea iniciar sesión?')">
 
                <div class="mb-3">
                    <label for="tipoUsuario">Tipo de Usuario</label>
                    <select id="tipoUsuario" class="form-select" required>
                        <option value="" selected disabled>Seleccione tipo de usuario</option>
                        <option value="administrador">Administrador</option>
                        <option value="vendedor">Vendedor</option>
                    </select>
                </div>
 
                <div class="mb-3">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" class="form-control" placeholder="usuario@ejemplo.com" required>
                </div>
 
                <div class="mb-2">
                    <label for="contrasena">Contraseña</label>
                    <div class="password-field">
                        <input type="password" id="contrasena" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('contrasena', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
 
                <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
 
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>
 
            <div class="login-footer">
                SGTR v1.0 · Sistema seguro y confiable
            </div>
        </div>
    </div>
