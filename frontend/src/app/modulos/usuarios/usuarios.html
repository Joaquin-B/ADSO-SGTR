<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a routerLink="/dashboard">Home</a></li>
        <li class="breadcrumb-item active">Usuarios</li>
    </ol>
</nav>

<div class="page-header d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div>
        <h2>Gestión de Usuarios</h2>
        <p>Administre usuarios y roles del sistema</p>
    </div>
    <button class="btn btn-primary" routerLink="/usuarios/nuevo">
        <i class="bi bi-plus-lg me-1"></i> Nuevo Usuario
    </button>
</div>


<div class="card mb-3" style="padding: 14px 16px;">
    <div class="search-bar">
        <i class="bi bi-search"></i>
        <input type="text" class="form-control" placeholder="Buscar usuarios...">
    </div>
</div>

<div class="card table-card">
    <div class="table-responsive">
        <table class="table mb-0">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Fecha Registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of usuario">
                    <td>{{item.nombres}}</td>
                    <td>{{item.apellidos}}</td>
                    <td>{{item.rol}}</td>
                    <td>
                        <span class="badge-pill soft-success" *ngIf="item.estado == 1">Activo</span>
                        <span class="badge-pill soft-danger" *ngIf="item.estado == 0">Inactivo</span>
                    </td>
                    <td>{{item.fecha_registro}}</td>
                    <td>
                        <button class="icon-btn"><i class="bi bi-pencil"></i></button>
                        <button class="icon-btn danger"
                            onclick="return confirmarAccion('¿Desea eliminar este usuario?')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
